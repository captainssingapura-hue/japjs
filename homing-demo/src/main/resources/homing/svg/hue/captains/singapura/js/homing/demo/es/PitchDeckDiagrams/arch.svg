<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Calibri, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBFD"/>
      <stop offset="1" stop-color="#EEF1F8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E2761" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#1E2761">The four-layer architecture</text>
  <text x="60" y="92" font-size="16" fill="#64748B">Each layer is useful on its own. Each can be adopted incrementally.</text>

  <!-- Layer 4 — Workspace -->
  <g filter="url(#shadow)">
    <rect x="60" y="130" width="1080" height="100" rx="6" fill="#FFFFFF" stroke="#CADCFC"/>
    <rect x="60" y="130" width="8" height="100" fill="#F4B942"/>
  </g>
  <text x="90" y="165" font-size="13" fill="#64748B" letter-spacing="2">LAYER 4 — WORKSPACE</text>
  <text x="90" y="195" font-size="22" font-weight="700" fill="#1E2761">Recursive split panes · Dockable tabs · Command registry · Serializable layout</text>
  <text x="90" y="218" font-size="14" fill="#3B4A6B">BSP binary tree of SplitNodes and PaneLeaves. Tabs are references, not owners.</text>

  <!-- Layer 3 — Typed Channel Bus -->
  <g filter="url(#shadow)">
    <rect x="60" y="245" width="1080" height="100" rx="6" fill="#FFFFFF" stroke="#CADCFC"/>
    <rect x="60" y="245" width="8" height="100" fill="#F4B942"/>
  </g>
  <text x="90" y="280" font-size="13" fill="#64748B" letter-spacing="2">LAYER 3 — TYPED CHANNEL BUS</text>
  <text x="90" y="310" font-size="22" font-weight="700" fill="#1E2761">Java-declared channels &amp; messages · widget↔widget · widget↔server</text>
  <text x="90" y="333" font-size="14" fill="#3B4A6B">Same types, same semantics, across both tiers. Branch-scoped subscriptions.</text>

  <!-- Layer 2 — DOM Ownership -->
  <g filter="url(#shadow)">
    <rect x="60" y="360" width="1080" height="100" rx="6" fill="#FFFFFF" stroke="#CADCFC"/>
    <rect x="60" y="360" width="8" height="100" fill="#F4B942"/>
  </g>
  <text x="90" y="395" font-size="13" fill="#64748B" letter-spacing="2">LAYER 2 — DOM OWNERSHIP  (DomOpsParty)</text>
  <text x="90" y="425" font-size="22" font-weight="700" fill="#1E2761">Named element registry · set-once activation · single-call dissolve</text>
  <text x="90" y="448" font-size="14" fill="#3B4A6B">WeakRef-based leak detection. Long-lived workspace UIs stay honest.</text>

  <!-- Layer 1 — Module & Asset Wiring -->
  <g filter="url(#shadow)">
    <rect x="60" y="475" width="1080" height="100" rx="6" fill="#FFFFFF" stroke="#CADCFC"/>
    <rect x="60" y="475" width="8" height="100" fill="#F4B942"/>
  </g>
  <text x="90" y="510" font-size="13" fill="#64748B" letter-spacing="2">LAYER 1 — MODULE &amp; ASSET WIRING  (homing-core)</text>
  <text x="90" y="540" font-size="22" font-weight="700" fill="#1E2761">EsModule · DomModule · AppModule · SvgGroup · CssGroup · ExternalModule</text>
  <text x="90" y="563" font-size="14" fill="#3B4A6B">Java records declare the ES module graph. Generated, not hand-wired.</text>

  <!-- Layer 0 — Server Adapter -->
  <g filter="url(#shadow)">
    <rect x="60" y="590" width="1080" height="100" rx="6" fill="#1E2761"/>
    <rect x="60" y="590" width="8" height="100" fill="#F4B942"/>
  </g>
  <text x="90" y="625" font-size="13" fill="#CADCFC" letter-spacing="2">LAYER 0 — SERVER ADAPTER  (pluggable · bring-your-own-HTTP)</text>
  <text x="90" y="655" font-size="22" font-weight="700" fill="#FFFFFF">/app · /module · /css · /css-content</text>
  <text x="90" y="678" font-size="14" fill="#CADCFC">Four stateless endpoints. Implementable on Spring Boot, Vert.x, Micronaut, Quarkus, or Servlets.</text>

  <!-- Right-side dependency arrow indicator -->
  <text x="1165" y="180" font-size="11" fill="#64748B" letter-spacing="1" transform="rotate(90 1165 180)">HIGHER LAYERS DEPEND ON LOWER</text>

  <!-- Built vs Designed legend -->
  <g transform="translate(60, 720)">
    <circle cx="6" cy="6" r="5" fill="#F4B942"/>
    <text x="20" y="11" font-size="13" fill="#3B4A6B">Layers 0 &amp; 1: built and running demo apps today · Layers 2–4: designed, with prototypes in adjacent repos</text>
  </g>
</svg>
