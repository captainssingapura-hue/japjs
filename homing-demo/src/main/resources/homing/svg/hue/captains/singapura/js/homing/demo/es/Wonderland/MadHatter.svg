<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .role { font-family: sans-serif; font-size: 11px; fill: #888780; }
  </style>
  <!-- legs -->
  <rect x="84" y="227" width="10" height="18" rx="4" fill="#7F77DD"/>
  <rect x="102" y="227" width="10" height="18" rx="4" fill="#7F77DD"/>
  <ellipse cx="89" cy="246" rx="9" ry="5" fill="#3C3489"/>
  <ellipse cx="107" cy="246" rx="9" ry="5" fill="#3C3489"/>
  <!-- coat body -->
  <ellipse cx="100" cy="194" rx="44" ry="38" fill="#7F77DD"/>
  <!-- waistcoat -->
  <ellipse cx="100" cy="192" rx="20" ry="34" fill="#EF9F27"/>
  <!-- buttons -->
  <circle cx="100" cy="172" r="3" fill="#BA7517"/>
  <circle cx="100" cy="184" r="3" fill="#BA7517"/>
  <circle cx="100" cy="196" r="3" fill="#BA7517"/>
  <!-- coat torso -->
  <rect x="84" y="148" width="32" height="42" rx="6" fill="#7F77DD"/>
  <!-- waistcoat top -->
  <rect x="91" y="150" width="18" height="36" rx="4" fill="#EF9F27"/>
  <!-- arms -->
  <line x1="84" y1="158" x2="60" y2="185" stroke="#7F77DD" stroke-width="12" stroke-linecap="round"/>
  <line x1="116" y1="158" x2="140" y2="178" stroke="#7F77DD" stroke-width="12" stroke-linecap="round"/>
  <!-- hands -->
  <circle cx="60" cy="188" r="7" fill="#FAEEDA"/>
  <circle cx="140" cy="181" r="7" fill="#FAEEDA"/>
  <!-- teacup -->
  <ellipse cx="140" cy="176" rx="11" ry="6" fill="#C0DD97"/>
  <rect x="129" y="170" width="22" height="12" rx="3" fill="#C0DD97" opacity="0.7"/>
  <!-- neck -->
  <rect x="92" y="137" width="16" height="15" rx="4" fill="#FAEEDA"/>
  <!-- cravat -->
  <path d="M88 145 Q100 152 112 145 Q100 140 88 145Z" fill="#E24B4A"/>
  <!-- head -->
  <ellipse cx="100" cy="112" rx="28" ry="28" fill="#FAEEDA"/>
  <!-- hair -->
  <ellipse cx="72" cy="107" rx="12" ry="18" fill="#E24B4A"/>
  <ellipse cx="128" cy="107" rx="12" ry="18" fill="#E24B4A"/>
  <ellipse cx="100" cy="88" rx="26" ry="10" fill="#E24B4A"/>
  <!-- HAT -->
  <rect x="74" y="44" width="52" height="52" rx="4" fill="#2C2C2A"/>
  <rect x="66" y="92" width="68" height="8" rx="4" fill="#2C2C2A"/>
  <!-- hat band -->
  <rect x="74" y="60" width="52" height="8" fill="#639922" opacity="0.8"/>
  <!-- price tag -->
  <rect x="116" y="48" width="14" height="12" rx="2" fill="#EAF3DE"/>
  <text font-family="sans-serif" font-size="6" fill="#3B6D11" x="119" y="57">10/6</text>
  <!-- eyes with glasses -->
  <ellipse cx="88" cy="112" rx="5" ry="5.5" fill="#2C2C2A"/>
  <ellipse cx="112" cy="112" rx="5" ry="5.5" fill="#2C2C2A"/>
  <circle cx="89" cy="110" r="2" fill="white"/>
  <circle cx="113" cy="110" r="2" fill="white"/>
  <circle cx="88" cy="112" r="8" fill="none" stroke="#888780" stroke-width="1.5"/>
  <circle cx="112" cy="112" r="8" fill="none" stroke="#888780" stroke-width="1.5"/>
  <line x1="96" y1="112" x2="104" y2="112" stroke="#888780" stroke-width="1"/>
  <!-- smile -->
  <path d="M84 126 Q100 137 116 126" stroke="#C04828" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text class="name" x="100" y="272" text-anchor="middle">Mad Hatter</text>
  <text class="role" x="100" y="286" text-anchor="middle">The eccentric host</text>
</svg>
