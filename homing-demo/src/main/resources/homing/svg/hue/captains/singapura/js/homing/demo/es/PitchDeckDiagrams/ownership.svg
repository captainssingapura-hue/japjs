<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Calibri, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBFD"/>
      <stop offset="1" stop-color="#EEF1F8"/>
    </linearGradient>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E2761" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg2)"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#1E2761">Ownership tree vs. Layout tree</text>
  <text x="60" y="92" font-size="16" fill="#64748B">Two independent structures. Widgets live in one. Panes live in the other. Tabs are references.</text>

  <!-- Left panel: Ownership Tree -->
  <g filter="url(#sh2)">
    <rect x="60" y="125" width="540" height="580" rx="8" fill="#FFFFFF" stroke="#CADCFC"/>
    <rect x="60" y="125" width="540" height="44" rx="8" fill="#1E2761"/>
    <rect x="60" y="155" width="540" height="14" fill="#1E2761"/>
  </g>
  <text x="80" y="154" font-size="16" font-weight="700" fill="#FFFFFF" letter-spacing="1">OWNERSHIP TREE  (DomOpsParty)</text>
  <text x="80" y="195" font-size="13" fill="#64748B" font-style="italic">Who created what · Who destroys what · What leaks</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#111936">
    <text x="80" y="230">domOpsParty (root)</text>
    <text x="80" y="255">├── workspace-shell</text>
    <text x="80" y="275">│     ├── split-H</text>
    <text x="80" y="295">│     │     ├── split-V</text>
    <text x="80" y="315">│     │     │     ├── pane-nav</text>
    <text x="80" y="335">│     │     │     └── pane-status</text>
    <text x="80" y="355">│     │     └── pane-editor</text>
    <text x="80" y="375">│     └── status-bar</text>
    <text x="80" y="395">│</text>
    <text x="80" y="415" fill="#1E2761" font-weight="700">└── widgets  ← flat registry</text>
    <text x="80" y="440">      ├── filetree-src</text>
    <text x="80" y="460">      ├── filetree-build</text>
    <text x="80" y="480">      ├── editor-readme</text>
    <text x="80" y="500">      ├── editor-app-js</text>
    <text x="80" y="520">      └── help-viewer</text>
  </g>

  <rect x="80" y="545" width="500" height="140" rx="4" fill="#F4B942" fill-opacity="0.12" stroke="#F4B942" stroke-opacity="0.6"/>
  <text x="95" y="568" font-size="13" font-weight="700" fill="#1E2761" letter-spacing="1">KEY INSIGHT</text>
  <text x="95" y="592" font-size="14" fill="#111936">Widgets are parented under a flat registry, not under</text>
  <text x="95" y="613" font-size="14" fill="#111936">their currently-hosting pane. Dragging a tab between</text>
  <text x="95" y="634" font-size="14" fill="#111936">panes is one <tspan font-family="Consolas, monospace" font-weight="700">appendChild</tspan> — the widget's branch,</text>
  <text x="95" y="655" font-size="14" fill="#111936">state, and subscriptions are untouched.</text>

  <!-- Right panel: Layout Tree -->
  <g filter="url(#sh2)">
    <rect x="620" y="125" width="520" height="580" rx="8" fill="#FFFFFF" stroke="#CADCFC"/>
    <rect x="620" y="125" width="520" height="44" rx="8" fill="#F4B942"/>
    <rect x="620" y="155" width="520" height="14" fill="#F4B942"/>
  </g>
  <text x="640" y="154" font-size="16" font-weight="700" fill="#1E2761" letter-spacing="1">LAYOUT TREE  (Workspace)</text>
  <text x="640" y="195" font-size="13" fill="#64748B" font-style="italic">Who's shown where · Split ratios · Tab order</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#111936">
    <text x="640" y="230">WorkspaceLayout</text>
    <text x="640" y="255">└── SplitNode (H, ratio=0.30)</text>
    <text x="640" y="275">      ├── SplitNode (V, ratio=0.85)</text>
    <text x="640" y="295">      │     ├── PaneLeaf "pane-nav"</text>
    <text x="640" y="315">      │     │     ├── Tab → filetree-src</text>
    <text x="640" y="335">      │     │     └── Tab → filetree-build</text>
    <text x="640" y="355">      │     └── PaneLeaf "pane-status"</text>
    <text x="640" y="375">      │</text>
    <text x="640" y="395">      └── PaneLeaf "pane-editor"</text>
    <text x="640" y="415">            ├── Tab → editor-readme</text>
    <text x="640" y="435">            └── Tab → editor-app-js ★</text>
    <text x="640" y="470">Modals</text>
    <text x="640" y="490">└── Modal → help-viewer</text>
  </g>

  <rect x="640" y="545" width="480" height="140" rx="4" fill="#CADCFC" fill-opacity="0.35" stroke="#1E2761" stroke-opacity="0.3"/>
  <text x="655" y="568" font-size="13" font-weight="700" fill="#1E2761" letter-spacing="1">SERIALIZABLE</text>
  <text x="655" y="592" font-size="14" fill="#111936">Sealed Java record hierarchy: SplitNode | PaneLeaf.</text>
  <text x="655" y="613" font-size="14" fill="#111936">JSON-stringify to localStorage or persist to server via</text>
  <text x="655" y="634" font-size="14" fill="#111936">a typed endpoint. Unresolved widgetIds render as</text>
  <text x="655" y="655" font-size="14" fill="#111936">placeholder tabs, not a crash.</text>

  <text x="60" y="740" font-size="13" fill="#64748B" font-style="italic">Splitting a pane: dissolve its leaf branch, create a SplitNode branch with two fresh leaves, redistribute tabs.  Widgets never move in the ownership tree.</text>
</svg>
