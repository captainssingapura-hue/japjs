<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>japjs Demo</title>
    <style>
        #gallery { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; }
    </style>
</head>
<body>
    <h1>japjs Demo</h1>
    <p id="result1"></p>
    <p id="result2"></p>
    <div id="gallery"></div>
    <script type="module">
        import {Bob} from "./test/hue/captains/singapura/japjs/demo/es/BobModule.js";
        const bob = new Bob();
        document.getElementById("result1").textContent = bob.test1();
        document.getElementById("result2").textContent = bob.test2();

        const gallery = document.getElementById("gallery");
        for (const svg of bob.wonderlandCharacters()) {
            gallery.appendChild(svg);
        }
    </script>
</body>
</html>
