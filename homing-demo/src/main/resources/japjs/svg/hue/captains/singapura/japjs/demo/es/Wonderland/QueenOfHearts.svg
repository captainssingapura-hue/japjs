<svg width="200" height="295" viewBox="0 0 200 295" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .role { font-family: sans-serif; font-size: 11px; fill: #888780; }
  </style>
  <!-- dress wide -->
  <ellipse cx="100" cy="200" rx="55" ry="45" fill="#A32D2D"/>
  <ellipse cx="100" cy="200" rx="55" ry="45" fill="none" stroke="#EF9F27" stroke-width="3" opacity="0.6"/>
  <ellipse cx="100" cy="200" rx="25" ry="42" fill="#E24B4A"/>
  <!-- heart on dress -->
  <path d="M92 188 Q100 180 108 188 Q116 180 124 188 Q124 202 100 216 Q76 202 92 188Z" fill="#A32D2D"/>
  <!-- body -->
  <rect x="83" y="148" width="34" height="45" rx="6" fill="#A32D2D"/>
  <rect x="91" y="150" width="18" height="40" rx="4" fill="#EF9F27" opacity="0.8"/>
  <!-- arms -->
  <line x1="83" y1="160" x2="56" y2="185" stroke="#A32D2D" stroke-width="13" stroke-linecap="round"/>
  <line x1="117" y1="160" x2="142" y2="178" stroke="#A32D2D" stroke-width="13" stroke-linecap="round"/>
  <circle cx="56" cy="188" r="7" fill="#FAEEDA"/>
  <circle cx="142" cy="181" r="7" fill="#FAEEDA"/>
  <!-- scepter -->
  <line x1="142" y1="178" x2="158" y2="140" stroke="#EF9F27" stroke-width="3" stroke-linecap="round"/>
  <path d="M154 128 Q162 128 162 136 Q162 141 154 141 Q150 141 150 135 Q150 128 154 128Z" fill="#EF9F27"/>
  <!-- neck -->
  <rect x="92" y="136" width="16" height="16" rx="4" fill="#FAEEDA"/>
  <!-- collar/ruff -->
  <ellipse cx="100" cy="144" rx="24" ry="10" fill="#FAC775" opacity="0.9"/>
  <!-- head -->
  <ellipse cx="100" cy="112" rx="28" ry="30" fill="#FAEEDA"/>
  <!-- hair -->
  <ellipse cx="100" cy="88" rx="26" ry="16" fill="#2C2C2A"/>
  <ellipse cx="100" cy="78" rx="20" ry="12" fill="#2C2C2A"/>
  <ellipse cx="76" cy="102" rx="10" ry="22" fill="#2C2C2A"/>
  <ellipse cx="124" cy="102" rx="10" ry="22" fill="#2C2C2A"/>
  <!-- CROWN -->
  <rect x="76" y="60" width="48" height="14" rx="2" fill="#EF9F27"/>
  <polygon points="76,60 84,40 92,60" fill="#EF9F27"/>
  <polygon points="92,60 100,36 108,60" fill="#EF9F27"/>
  <polygon points="108,60 116,40 124,60" fill="#EF9F27"/>
  <circle cx="84" cy="52" r="3" fill="#E24B4A"/>
  <circle cx="100" cy="48" r="3.5" fill="#E24B4A"/>
  <circle cx="116" cy="52" r="3" fill="#E24B4A"/>
  <!-- stern brows -->
  <path d="M84 103 Q91 99 96 102" stroke="#2C2C2A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M104 102 Q109 99 116 103" stroke="#2C2C2A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="90" cy="112" rx="5" ry="5" fill="#2C2C2A"/>
  <ellipse cx="110" cy="112" rx="5" ry="5" fill="#2C2C2A"/>
  <circle cx="91" cy="110" r="2" fill="white"/>
  <circle cx="111" cy="110" r="2" fill="white"/>
  <!-- stern mouth -->
  <path d="M88 124 Q100 121 112 124" stroke="#A32D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- legs -->
  <rect x="85" y="238" width="10" height="18" rx="4" fill="#A32D2D"/>
  <rect x="103" y="238" width="10" height="18" rx="4" fill="#A32D2D"/>
  <ellipse cx="90" cy="257" rx="9" ry="5" fill="#2C2C2A"/>
  <ellipse cx="108" cy="257" rx="9" ry="5" fill="#2C2C2A"/>
  <text class="name" x="100" y="276" text-anchor="middle">Queen of Hearts</text>
  <text class="role" x="100" y="290" text-anchor="middle">The tyrannical ruler</text>
</svg>
