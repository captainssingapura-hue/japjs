<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Calibri, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBFD"/>
      <stop offset="1" stop-color="#EEF1F8"/>
    </linearGradient>
    <filter id="sh4" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E2761" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1E2761"/>
    </marker>
    <marker id="arrowL" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#F4B942"/>
    </marker>
    <marker id="arrowAmberR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#F4B942"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg4)"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#1E2761">End-to-end typed messaging</text>
  <text x="60" y="92" font-size="16" fill="#64748B">Java records declare channels and messages. Same types for widget↔widget and widget↔server.</text>

  <!-- Browser box -->
  <g filter="url(#sh4)">
    <rect x="60" y="140" width="500" height="510" rx="10" fill="#FFFFFF" stroke="#CADCFC" stroke-width="2"/>
  </g>
  <rect x="60" y="140" width="500" height="40" rx="10" fill="#F4B942"/>
  <rect x="60" y="168" width="500" height="12" fill="#F4B942"/>
  <text x="80" y="167" font-size="15" font-weight="700" fill="#1E2761" letter-spacing="1">BROWSER — WORKSPACE</text>

  <!-- FilterPanel -->
  <rect x="95" y="210" width="430" height="100" rx="6" fill="#EEF1F8" stroke="#CADCFC"/>
  <text x="110" y="235" font-size="15" font-weight="700" fill="#1E2761">FilterPanel (widget)</text>
  <g font-family="Consolas, monospace" font-size="12" fill="#111936">
    <text x="110" y="260">bus.send(</text>
    <text x="110" y="278">  DataChannel.QueryRows,</text>
    <text x="110" y="296">  new QueryRowsRequest(filter))</text>
  </g>

  <!-- Local bus -->
  <rect x="95" y="340" width="430" height="110" rx="6" fill="#1E2761"/>
  <rect x="95" y="340" width="8" height="110" fill="#F4B942"/>
  <text x="120" y="365" font-size="14" font-weight="700" fill="#F4B942" letter-spacing="1">LOCAL BUS (JS)</text>
  <g font-size="13" fill="#CADCFC">
    <text x="120" y="392">• channels: generated from Java records</text>
    <text x="120" y="412">• messages: typed class bindings</text>
    <text x="120" y="432">• correlation IDs for request/response</text>
  </g>

  <!-- ChartPanel -->
  <rect x="95" y="480" width="430" height="130" rx="6" fill="#EEF1F8" stroke="#CADCFC"/>
  <text x="110" y="506" font-size="15" font-weight="700" fill="#1E2761">ChartPanel (widget)</text>
  <g font-family="Consolas, monospace" font-size="12" fill="#111936">
    <text x="110" y="530">bus.subscribe(</text>
    <text x="110" y="548">  DataChannel.RowsUpdated,</text>
    <text x="110" y="566">  msg =&gt; chart.render(msg.rows))</text>
  </g>
  <text x="110" y="594" font-size="11" fill="#64748B" font-style="italic">subscription scoped to DomOpsParty branch</text>

  <!-- Server box -->
  <g filter="url(#sh4)">
    <rect x="700" y="140" width="440" height="510" rx="10" fill="#FFFFFF" stroke="#CADCFC" stroke-width="2"/>
  </g>
  <rect x="700" y="140" width="440" height="40" rx="10" fill="#1E2761"/>
  <rect x="700" y="168" width="440" height="12" fill="#1E2761"/>
  <text x="720" y="167" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="1">SERVER — JVM</text>

  <!-- Handler -->
  <rect x="730" y="280" width="380" height="110" rx="6" fill="#EEF1F8" stroke="#CADCFC"/>
  <text x="745" y="306" font-size="15" font-weight="700" fill="#1E2761">DataChannelHost</text>
  <text x="745" y="326" font-size="13" fill="#64748B" font-style="italic">Java handler</text>
  <g font-family="Consolas, monospace" font-size="12" fill="#111936">
    <text x="745" y="352">onRequest(QueryRowsRequest r) {</text>
    <text x="745" y="370">  return queryDb(r).toReply();</text>
    <text x="745" y="388">}</text>
  </g>

  <!-- Published update -->
  <rect x="730" y="430" width="380" height="100" rx="6" fill="#EEF1F8" stroke="#CADCFC"/>
  <text x="745" y="455" font-size="15" font-weight="700" fill="#1E2761">publish: RowsUpdated</text>
  <g font-family="Consolas, monospace" font-size="12" fill="#111936">
    <text x="745" y="482">bus.publish(</text>
    <text x="745" y="500">  DataChannel.RowsUpdated,</text>
    <text x="745" y="518">  new RowsUpdatedMessage(rows))</text>
  </g>

  <!-- Transport arrows (middle) -->
  <!-- Request: Browser → Server -->
  <line x1="540" y1="260" x2="700" y2="320" stroke="#1E2761" stroke-width="2" marker-end="url(#arrowR)"/>
  <rect x="556" y="240" width="128" height="30" rx="4" fill="#FFFFFF" stroke="#CADCFC"/>
  <text x="620" y="260" font-size="12" fill="#1E2761" text-anchor="middle" font-weight="700">request</text>

  <!-- Response: Server → Browser -->
  <line x1="700" y1="360" x2="540" y2="400" stroke="#F4B942" stroke-width="2" marker-end="url(#arrowL)"/>
  <rect x="556" y="375" width="128" height="30" rx="4" fill="#FFFFFF" stroke="#F4B942"/>
  <text x="620" y="395" font-size="12" fill="#1E2761" text-anchor="middle" font-weight="700">reply</text>

  <!-- Broadcast: Server → ChartPanel -->
  <line x1="700" y1="480" x2="540" y2="525" stroke="#F4B942" stroke-width="2" marker-end="url(#arrowL)"/>
  <rect x="556" y="496" width="128" height="30" rx="4" fill="#FFFFFF" stroke="#F4B942"/>
  <text x="620" y="516" font-size="12" fill="#1E2761" text-anchor="middle" font-weight="700">broadcast</text>

  <!-- Transport label -->
  <text x="620" y="215" font-size="12" fill="#64748B" text-anchor="middle" font-style="italic">WebSocket — Vert.x EventBus bridge · Spring WS · etc.</text>

  <!-- Footer callout -->
  <rect x="60" y="685" width="1080" height="52" rx="4" fill="#F4B942" fill-opacity="0.15" stroke="#F4B942" stroke-opacity="0.6"/>
  <text x="80" y="710" font-size="13" font-weight="700" fill="#1E2761" letter-spacing="1">ONE ABSTRACTION · ONE TYPE SYSTEM</text>
  <text x="80" y="728" font-size="14" fill="#111936">Widget↔widget · widget→server · server→widget · workspace commands — all flow through the same typed channels.</text>
</svg>
