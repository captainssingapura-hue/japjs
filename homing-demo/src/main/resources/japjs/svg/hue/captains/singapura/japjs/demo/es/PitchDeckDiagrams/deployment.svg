<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Calibri, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBFD"/>
      <stop offset="1" stop-color="#EEF1F8"/>
    </linearGradient>
    <filter id="sh3" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E2761" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1E2761"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg3)"/>

  <text x="60" y="60" font-size="30" font-weight="700" fill="#1E2761">Bring your own HTTP</text>
  <text x="60" y="92" font-size="16" fill="#64748B">japjs slots into the Java service you already run. No Node. No bundler. No stateful UI server.</text>

  <!-- Server box -->
  <g filter="url(#sh3)">
    <rect x="120" y="140" width="960" height="360" rx="10" fill="#FFFFFF" stroke="#CADCFC" stroke-width="2"/>
  </g>
  <rect x="120" y="140" width="960" height="44" rx="10" fill="#1E2761"/>
  <rect x="120" y="172" width="960" height="12" fill="#1E2761"/>
  <text x="140" y="169" font-size="16" font-weight="700" fill="#FFFFFF" letter-spacing="1">YOUR EXISTING JAVA SERVICE</text>

  <!-- Inner: existing HTTP framework -->
  <rect x="160" y="210" width="880" height="160" rx="6" fill="#EEF1F8" stroke="#CADCFC"/>
  <text x="180" y="240" font-size="14" font-weight="700" fill="#1E2761" letter-spacing="1">HTTP FRAMEWORK</text>
  <text x="180" y="262" font-size="16" fill="#111936">Spring Boot · Vert.x · Micronaut · Quarkus · plain Servlet container</text>

  <!-- Existing concerns (left) -->
  <g font-size="14" fill="#3B4A6B">
    <text x="180" y="296">• existing REST controllers</text>
    <text x="180" y="318">• existing auth / logging</text>
    <text x="180" y="340">• existing metrics / tracing</text>
  </g>

  <!-- japjs adapter box (right, inside HTTP framework) -->
  <rect x="620" y="280" width="400" height="76" rx="4" fill="#F4B942" fill-opacity="0.18" stroke="#F4B942" stroke-width="1.5"/>
  <text x="636" y="302" font-size="13" font-weight="700" fill="#1E2761" letter-spacing="1">+ JAPJS ADAPTER  (~4 routes, ~100–200 LOC)</text>
  <g font-family="Consolas, monospace" font-size="13" fill="#111936">
    <text x="636" y="324">/app · /module · /css · /css-content</text>
    <text x="636" y="344">+ bus transport adapter (WebSocket)</text>
  </g>

  <!-- Arrow down to japjs-core -->
  <line x1="600" y1="375" x2="600" y2="400" stroke="#1E2761" stroke-width="2" marker-end="url(#arrowNavy)"/>
  <text x="615" y="395" font-size="12" fill="#64748B" font-style="italic">calls into</text>

  <!-- japjs-core box -->
  <rect x="280" y="415" width="640" height="70" rx="6" fill="#1E2761"/>
  <text x="300" y="442" font-size="14" font-weight="700" fill="#F4B942" letter-spacing="1">JAPJS-CORE  (stateless)</text>
  <text x="300" y="466" font-size="14" fill="#CADCFC">EsModuleWriter · CssLoader · Resolvers · ContentProviders</text>

  <!-- Transport arrow -->
  <line x1="600" y1="510" x2="600" y2="565" stroke="#1E2761" stroke-width="2" marker-end="url(#arrowNavy)"/>
  <text x="615" y="545" font-size="13" fill="#64748B" font-style="italic">HTTP · WebSocket</text>

  <!-- Browser box -->
  <g filter="url(#sh3)">
    <rect x="120" y="580" width="960" height="140" rx="10" fill="#FFFFFF" stroke="#CADCFC" stroke-width="2"/>
  </g>
  <rect x="120" y="580" width="960" height="40" rx="10" fill="#F4B942"/>
  <rect x="120" y="608" width="960" height="12" fill="#F4B942"/>
  <text x="140" y="607" font-size="16" font-weight="700" fill="#1E2761" letter-spacing="1">BROWSER</text>

  <g font-size="14" fill="#3B4A6B">
    <text x="180" y="650">• native ES modules (no bundler)</text>
    <text x="180" y="672">• DomOpsParty — runtime DOM ownership &amp; leak detection</text>
    <text x="180" y="694">• typed channel bus client &amp; workspace shell</text>
  </g>

  <!-- Side callouts -->
  <g transform="translate(760,640)">
    <rect width="300" height="70" rx="4" fill="#CADCFC" fill-opacity="0.4" stroke="#1E2761" stroke-opacity="0.3"/>
    <text x="14" y="22" font-size="12" font-weight="700" fill="#1E2761" letter-spacing="1">NOT REQUIRED</text>
    <text x="14" y="42" font-size="13" fill="#111936">• Node / npm / webpack / vite</text>
    <text x="14" y="60" font-size="13" fill="#111936">• stateful UI server · sticky sessions</text>
  </g>
</svg>
