<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%"
     viewBox="0 0 640 440"
     preserveAspectRatio="xMidYMid meet"
     aria-labelledby="astShapeTitle"
     role="img">
    <title id="astShapeTitle">The .mdad+ typed AST — Block and Inline as sealed sums.</title>

    <defs>
        <style>
            .root-fill   { fill: var(--color-surface-recessed, #f4f4ed); }
            .root-stroke { stroke: var(--color-border-emphasis, #2A3F5F); stroke-width: 2; fill: none; }
            .sum-fill    { fill: var(--color-surface-base, #ffffff); }
            .sum-stroke  { stroke: var(--color-accent, #F4B942); stroke-width: 2; fill: none; }
            .var-fill    { fill: var(--color-surface-base, #ffffff); }
            .var-stroke  { stroke: var(--color-border, #C8C2A8); stroke-width: 1.5; fill: none; }
            .edge        { stroke: var(--color-border-emphasis, #2A3F5F); stroke-width: 1.5; fill: none; }
            .label-root  { fill: var(--color-text-primary, #2A3F5F); font: 700 14px 'Segoe UI', sans-serif; letter-spacing: 0.04em; }
            .label-sum   { fill: var(--color-text-primary, #2A3F5F); font: 600 13px 'Segoe UI', sans-serif; }
            .label-var   { fill: var(--color-text-primary, #2A3F5F); font: 500 11px monospace; }
            .label-note  { fill: var(--color-text-muted,   #6B6855); font: italic 11px 'Segoe UI', sans-serif; }
        </style>
    </defs>

    <!-- Root: TextSegment.parsed() : List<Block> -->
    <rect x="200" y="14" width="240" height="44" rx="6" class="root-fill"/>
    <rect x="200" y="14" width="240" height="44" rx="6" class="root-stroke"/>
    <text x="320" y="42" text-anchor="middle" class="label-root">TextSegment.parsed()</text>

    <!-- Edge to Block sum -->
    <line x1="320" y1="58" x2="320" y2="84" class="edge"/>

    <!-- Block sealed sum -->
    <rect x="40" y="84" width="560" height="44" rx="6" class="sum-fill"/>
    <rect x="40" y="84" width="560" height="44" rx="6" class="sum-stroke"/>
    <text x="320" y="111" text-anchor="middle" class="label-sum">sealed Block — Para | Bullets | Numbered | Quote</text>

    <!-- Edges to Block variants -->
    <line x1="120" y1="128" x2="120" y2="154" class="edge"/>
    <line x1="260" y1="128" x2="260" y2="154" class="edge"/>
    <line x1="380" y1="128" x2="380" y2="154" class="edge"/>
    <line x1="520" y1="128" x2="520" y2="154" class="edge"/>

    <!-- Block variants -->
    <rect x="40"  y="154" width="160" height="34" rx="4" class="var-fill"/>
    <rect x="40"  y="154" width="160" height="34" rx="4" class="var-stroke"/>
    <text x="120" y="176" text-anchor="middle" class="label-var">Para(inlines)</text>

    <rect x="200" y="154" width="120" height="34" rx="4" class="var-fill"/>
    <rect x="200" y="154" width="120" height="34" rx="4" class="var-stroke"/>
    <text x="260" y="176" text-anchor="middle" class="label-var">Bullets(items)</text>

    <rect x="320" y="154" width="120" height="34" rx="4" class="var-fill"/>
    <rect x="320" y="154" width="120" height="34" rx="4" class="var-stroke"/>
    <text x="380" y="176" text-anchor="middle" class="label-var">Numbered(items)</text>

    <rect x="440" y="154" width="160" height="34" rx="4" class="var-fill"/>
    <rect x="440" y="154" width="160" height="34" rx="4" class="var-stroke"/>
    <text x="520" y="176" text-anchor="middle" class="label-var">Quote(inlines)</text>

    <!-- Bridge note -->
    <text x="320" y="216" text-anchor="middle" class="label-note">… each carries List&lt;Inline&gt; (or List&lt;List&lt;Inline&gt;&gt; for list items)</text>

    <!-- Edge to Inline sum -->
    <line x1="320" y1="226" x2="320" y2="252" class="edge"/>

    <!-- Inline sealed sum -->
    <rect x="40" y="252" width="560" height="44" rx="6" class="sum-fill"/>
    <rect x="40" y="252" width="560" height="44" rx="6" class="sum-stroke"/>
    <text x="320" y="279" text-anchor="middle" class="label-sum">sealed Inline — Text | Bold | Italic | Code | Ref</text>

    <!-- Edges to Inline variants -->
    <line x1="100" y1="296" x2="100" y2="322" class="edge"/>
    <line x1="220" y1="296" x2="220" y2="322" class="edge"/>
    <line x1="320" y1="296" x2="320" y2="322" class="edge"/>
    <line x1="420" y1="296" x2="420" y2="322" class="edge"/>
    <line x1="540" y1="296" x2="540" y2="322" class="edge"/>

    <!-- Inline variants -->
    <rect x="40"  y="322" width="120" height="34" rx="4" class="var-fill"/>
    <rect x="40"  y="322" width="120" height="34" rx="4" class="var-stroke"/>
    <text x="100" y="344" text-anchor="middle" class="label-var">Text(text)</text>

    <rect x="160" y="322" width="120" height="34" rx="4" class="var-fill"/>
    <rect x="160" y="322" width="120" height="34" rx="4" class="var-stroke"/>
    <text x="220" y="344" text-anchor="middle" class="label-var">Bold(inlines)</text>

    <rect x="280" y="322" width="80"  height="34" rx="4" class="var-fill"/>
    <rect x="280" y="322" width="80"  height="34" rx="4" class="var-stroke"/>
    <text x="320" y="344" text-anchor="middle" class="label-var">Italic(…)</text>

    <rect x="360" y="322" width="120" height="34" rx="4" class="var-fill"/>
    <rect x="360" y="322" width="120" height="34" rx="4" class="var-stroke"/>
    <text x="420" y="344" text-anchor="middle" class="label-var">Code(text)</text>

    <rect x="480" y="322" width="120" height="34" rx="4" class="var-fill"/>
    <rect x="480" y="322" width="120" height="34" rx="4" class="var-stroke"/>
    <text x="540" y="344" text-anchor="middle" class="label-var">Ref(label, anchor)</text>

    <!-- Footer note -->
    <text x="320" y="394" text-anchor="middle" class="label-note">Bold and Italic refuse to nest each other — '***' is a parse error, not a silent collapse.</text>
    <text x="320" y="414" text-anchor="middle" class="label-note">Every variant is a Java record; exhaustive switch dispatch in renderer + serialiser.</text>
</svg>
