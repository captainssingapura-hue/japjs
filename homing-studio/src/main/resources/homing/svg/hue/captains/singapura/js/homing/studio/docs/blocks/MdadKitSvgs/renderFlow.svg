<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%"
     viewBox="0 0 720 400"
     preserveAspectRatio="xMidYMid meet"
     aria-labelledby="renderFlowTitle"
     role="img">
    <title id="renderFlowTitle">Server-to-client render flow for a TextSegment — parsed once, walked once, no second parser.</title>

    <defs>
        <style>
            .pane-server { fill: var(--color-surface-recessed, #f4f4ed); }
            .pane-client { fill: var(--color-surface-base,     #ffffff); }
            .pane-stroke { stroke: var(--color-border-emphasis, #2A3F5F); stroke-width: 2; fill: none; }
            .box-fill    { fill: var(--color-surface-base, #ffffff); }
            .box-stroke  { stroke: var(--color-border, #C8C2A8); stroke-width: 1.5; fill: none; }
            .arrow       { stroke: var(--color-accent, #F4B942); stroke-width: 2.5; fill: none; }
            .wire        { stroke: var(--color-border-emphasis, #2A3F5F); stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
            .arrowhead   { fill: var(--color-accent, #F4B942); }
            .wirehead    { fill: var(--color-border-emphasis, #2A3F5F); }
            .pane-label  { fill: var(--color-text-muted,   #6B6855); font: 700 11px 'Segoe UI', sans-serif; letter-spacing: 0.12em; }
            .box-label   { fill: var(--color-text-primary, #2A3F5F); font: 600 12px 'Segoe UI', sans-serif; }
            .box-sub     { fill: var(--color-text-muted,   #6B6855); font: 500 10px 'Segoe UI', sans-serif; }
            .wire-label  { fill: var(--color-text-primary, #2A3F5F); font: 600 11px monospace; }
        </style>
        <marker id="ah1" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead"/>
        </marker>
        <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" class="wirehead"/>
        </marker>
    </defs>

    <!-- ====================== SERVER pane ====================== -->
    <rect x="20" y="40" width="280" height="340" rx="6" class="pane-server"/>
    <rect x="20" y="40" width="280" height="340" rx="6" class="pane-stroke"/>
    <text x="40" y="34" class="pane-label">SERVER · JAVA</text>

    <!-- TextSegment(...) -->
    <rect x="40" y="58" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="40" y="58" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="160" y="80" text-anchor="middle" class="box-label">new TextSegment(body, title)</text>
    <text x="160" y="100" text-anchor="middle" class="box-sub">constructor calls TextParser.parse</text>

    <line x1="160" y1="116" x2="160" y2="140" class="arrow" marker-end="url(#ah1)"/>

    <!-- AST -->
    <rect x="40" y="140" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="40" y="140" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="160" y="162" text-anchor="middle" class="box-label">List&lt;Block&gt; (validated AST)</text>
    <text x="160" y="182" text-anchor="middle" class="box-sub">held as record component data</text>

    <line x1="160" y1="198" x2="160" y2="222" class="arrow" marker-end="url(#ah1)"/>

    <!-- ComposedDoc.contents -->
    <rect x="40" y="222" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="40" y="222" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="160" y="244" text-anchor="middle" class="box-label">ComposedDoc.contents()</text>
    <text x="160" y="264" text-anchor="middle" class="box-sub">appendBlocks / appendInlines → JSON</text>

    <line x1="160" y1="280" x2="160" y2="304" class="arrow" marker-end="url(#ah1)"/>

    <!-- DocGetAction -->
    <rect x="40" y="304" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="40" y="304" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="160" y="326" text-anchor="middle" class="box-label">GET /doc?id=&lt;uuid&gt;</text>
    <text x="160" y="346" text-anchor="middle" class="box-sub">application/json · doc.contents()</text>

    <!-- ====================== WIRE ====================== -->
    <line x1="300" y1="333" x2="420" y2="333" class="wire" marker-end="url(#ah2)"/>
    <text x="360" y="324" text-anchor="middle" class="wire-label">JSON</text>

    <!-- ====================== CLIENT pane ====================== -->
    <rect x="420" y="40" width="280" height="340" rx="6" class="pane-client"/>
    <rect x="420" y="40" width="280" height="340" rx="6" class="pane-stroke"/>
    <text x="440" y="34" class="pane-label">CLIENT · JS</text>

    <!-- fetch -->
    <rect x="440" y="304" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="440" y="304" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="560" y="326" text-anchor="middle" class="box-label">fetch("/doc?id=…")</text>
    <text x="560" y="346" text-anchor="middle" class="box-sub">ComposedViewer body load</text>

    <line x1="560" y1="304" x2="560" y2="280" class="arrow" marker-end="url(#ah1)"/>

    <!-- JSON envelope -->
    <rect x="440" y="222" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="440" y="222" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="560" y="244" text-anchor="middle" class="box-label">{ kind:"text", blocks:[…] }</text>
    <text x="560" y="264" text-anchor="middle" class="box-sub">parsed AST shipped intact</text>

    <line x1="560" y1="222" x2="560" y2="198" class="arrow" marker-end="url(#ah1)"/>

    <!-- _renderTextSegment -->
    <rect x="440" y="140" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="440" y="140" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="560" y="162" text-anchor="middle" class="box-label">_renderTextSegment + _renderInlines</text>
    <text x="560" y="182" text-anchor="middle" class="box-sub">pure data walk — no markdown library</text>

    <line x1="560" y1="140" x2="560" y2="116" class="arrow" marker-end="url(#ah1)"/>

    <!-- DOM -->
    <rect x="440" y="58" width="240" height="58" rx="4" class="box-fill"/>
    <rect x="440" y="58" width="240" height="58" rx="4" class="box-stroke"/>
    <text x="560" y="80" text-anchor="middle" class="box-label">Semantic HTML in main</text>
    <text x="560" y="100" text-anchor="middle" class="box-sub">&lt;p&gt; &lt;ul&gt; &lt;ol&gt; &lt;blockquote&gt; &lt;strong&gt; &lt;em&gt; &lt;code&gt; &lt;a&gt;</text>
</svg>
