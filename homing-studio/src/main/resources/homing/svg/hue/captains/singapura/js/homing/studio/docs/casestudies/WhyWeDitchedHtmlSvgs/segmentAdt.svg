<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%"
     viewBox="0 0 520 340"
     preserveAspectRatio="xMidYMid meet"
     aria-labelledby="segmentAdtTitle"
     role="img">
    <title id="segmentAdtTitle">ComposedDoc with four typed segment variants — markdown, SVG, table, image.</title>

    <defs>
        <style>
            .envelope-fill   { fill: var(--color-surface-recessed, #f4f4ed); }
            .envelope-stroke { stroke: var(--color-border-emphasis, #2A3F5F); stroke-width: 2; fill: none; }
            .seg-fill        { fill: var(--color-surface-base, #ffffff); }
            .seg-stroke      { stroke: var(--color-border, #C8C2A8); stroke-width: 1.5; fill: none; }
            .accent          { stroke: var(--color-accent, #F4B942); stroke-width: 3; fill: none; }
            .label           { fill: var(--color-text-primary, #2A3F5F); font: 600 13px 'Segoe UI', sans-serif; }
            .kind            { fill: var(--color-text-muted,  #6B6855); font: 500 11px monospace; }
            .glyph           { fill: var(--color-accent,      #F4B942); }
            .envelope-label  { fill: var(--color-text-primary, #2A3F5F); font: 700 14px 'Segoe UI', sans-serif; letter-spacing: 0.04em; }
        </style>
    </defs>

    <!-- ComposedDoc envelope -->
    <rect x="10" y="10" width="500" height="320" rx="8" class="envelope-fill"/>
    <rect x="10" y="10" width="500" height="320" rx="8" class="envelope-stroke"/>
    <text x="30" y="34" class="envelope-label">ComposedDoc · List&lt;Segment&gt;</text>
    <line x1="10" y1="46" x2="510" y2="46" class="accent"/>

    <!-- Segment 1: MarkdownSegment -->
    <rect x="30" y="62" width="460" height="56" rx="4" class="seg-fill"/>
    <rect x="30" y="62" width="460" height="56" rx="4" class="seg-stroke"/>
    <!-- prose-line glyphs -->
    <rect x="46" y="78" width="180" height="3" class="glyph"/>
    <rect x="46" y="88" width="220" height="3" class="glyph"/>
    <rect x="46" y="98" width="160" height="3" class="glyph"/>
    <text x="320" y="86" class="label">MarkdownSegment</text>
    <text x="320" y="104" class="kind">kind = "markdown"</text>

    <!-- Segment 2: SvgSegment -->
    <rect x="30" y="128" width="460" height="56" rx="4" class="seg-fill"/>
    <rect x="30" y="128" width="460" height="56" rx="4" class="seg-stroke"/>
    <!-- mini SVG glyph (triangle + circle) -->
    <polygon points="76,170 96,138 116,170" class="glyph"/>
    <circle cx="148" cy="156" r="14" class="glyph"/>
    <text x="320" y="152" class="label">SvgSegment</text>
    <text x="320" y="170" class="kind">kind = "svg" · proxy → SvgDoc</text>

    <!-- Segment 3: TableSegment -->
    <rect x="30" y="194" width="460" height="56" rx="4" class="seg-fill"/>
    <rect x="30" y="194" width="460" height="56" rx="4" class="seg-stroke"/>
    <!-- mini table glyph -->
    <rect x="50" y="208" width="220" height="32" class="seg-stroke"/>
    <line x1="50"  y1="220" x2="270" y2="220" class="seg-stroke"/>
    <line x1="120" y1="208" x2="120" y2="240" class="seg-stroke"/>
    <line x1="195" y1="208" x2="195" y2="240" class="seg-stroke"/>
    <rect x="52"  y="210" width="66" height="8" class="glyph"/>
    <text x="320" y="218" class="label">TableSegment</text>
    <text x="320" y="236" class="kind">kind = "table" · proxy → TableDoc</text>

    <!-- Segment 4: ImageSegment -->
    <rect x="30" y="260" width="460" height="56" rx="4" class="seg-fill"/>
    <rect x="30" y="260" width="460" height="56" rx="4" class="seg-stroke"/>
    <!-- mini image glyph (frame with sun + mountain) -->
    <rect x="50" y="272" width="80" height="36" class="seg-stroke"/>
    <circle cx="70" cy="284" r="5" class="glyph"/>
    <polygon points="55,304 80,288 105,304 128,304 128,308 52,308" class="glyph"/>
    <text x="320" y="284" class="label">ImageSegment</text>
    <text x="320" y="302" class="kind">kind = "image" · proxy → ImageDoc</text>
</svg>
