<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%"
     viewBox="0 0 720 360"
     preserveAspectRatio="xMidYMid meet"
     aria-labelledby="parsePipelineTitle"
     role="img">
    <title id="parsePipelineTitle">TextParser pipeline — body text traverses four passes into a typed AST.</title>

    <defs>
        <style>
            .stage-fill   { fill: var(--color-surface-base, #ffffff); }
            .stage-stroke { stroke: var(--color-border, #C8C2A8); stroke-width: 1.5; fill: none; }
            .stage-pri    { stroke: var(--color-border-emphasis, #2A3F5F); stroke-width: 2; fill: none; }
            .arrow        { stroke: var(--color-accent, #F4B942); stroke-width: 2.5; fill: none; }
            .arrowhead    { fill: var(--color-accent, #F4B942); }
            .label-stage  { fill: var(--color-text-primary, #2A3F5F); font: 600 13px 'Segoe UI', sans-serif; }
            .label-sub    { fill: var(--color-text-muted,   #6B6855); font: 500 11px 'Segoe UI', sans-serif; }
            .label-code   { fill: var(--color-text-primary, #2A3F5F); font: 500 11px monospace; }
            .label-title  { fill: var(--color-text-primary, #2A3F5F); font: 700 13px 'Segoe UI', sans-serif; letter-spacing: 0.04em; }
        </style>
        <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead"/>
        </marker>
    </defs>

    <text x="20" y="24" class="label-title">PIPELINE</text>

    <!-- Stage 1: Input -->
    <rect x="20" y="44" width="180" height="80" rx="4" class="stage-fill"/>
    <rect x="20" y="44" width="180" height="80" rx="4" class="stage-pri"/>
    <text x="110" y="64" text-anchor="middle" class="label-stage">Body string</text>
    <text x="110" y="84" text-anchor="middle" class="label-sub">Java text block</text>
    <text x="110" y="106" text-anchor="middle" class="label-code">"Hello **world**.\n\n- a\n- b"</text>

    <line x1="200" y1="84" x2="240" y2="84" class="arrow" marker-end="url(#ah)"/>

    <!-- Stage 2: Normalise + block split -->
    <rect x="240" y="44" width="180" height="80" rx="4" class="stage-fill"/>
    <rect x="240" y="44" width="180" height="80" rx="4" class="stage-stroke"/>
    <text x="330" y="64" text-anchor="middle" class="label-stage">Normalise + block split</text>
    <text x="330" y="84" text-anchor="middle" class="label-sub">CRLF→LF · blank-line split</text>
    <text x="330" y="106" text-anchor="middle" class="label-code">["Hello **world**.", "- a", "- b"]</text>

    <line x1="420" y1="84" x2="460" y2="84" class="arrow" marker-end="url(#ah)"/>

    <!-- Stage 3: Block classify -->
    <rect x="460" y="44" width="240" height="80" rx="4" class="stage-fill"/>
    <rect x="460" y="44" width="240" height="80" rx="4" class="stage-stroke"/>
    <text x="580" y="64" text-anchor="middle" class="label-stage">Block classify</text>
    <text x="580" y="84" text-anchor="middle" class="label-sub">leading marker → Para / Bullets / Numbered / Quote</text>
    <text x="580" y="106" text-anchor="middle" class="label-code">[Para(…), Bullets([…, …])]</text>

    <!-- Vertical arrow down to stage 4 -->
    <line x1="580" y1="124" x2="580" y2="164" class="arrow" marker-end="url(#ah)"/>

    <!-- Stage 4: Inline tokenize -->
    <rect x="280" y="164" width="420" height="80" rx="4" class="stage-fill"/>
    <rect x="280" y="164" width="420" height="80" rx="4" class="stage-stroke"/>
    <text x="490" y="184" text-anchor="middle" class="label-stage">Inline tokenize per block</text>
    <text x="490" y="204" text-anchor="middle" class="label-sub">single-pass scanner · ** · * · ` · [label](#ref:name)</text>
    <text x="490" y="226" text-anchor="middle" class="label-code">[Text("Hello "), Bold([Text("world")]), Text(".")]</text>

    <line x1="280" y1="204" x2="240" y2="204" class="arrow" marker-end="url(#ah)"/>

    <!-- Stage 5: Typed AST -->
    <rect x="20" y="164" width="220" height="80" rx="4" class="stage-fill"/>
    <rect x="20" y="164" width="220" height="80" rx="4" class="stage-pri"/>
    <text x="130" y="184" text-anchor="middle" class="label-stage">Typed AST</text>
    <text x="130" y="204" text-anchor="middle" class="label-sub">List&lt;Block&gt; · sealed sums</text>
    <text x="130" y="226" text-anchor="middle" class="label-code">[Para(…), Bullets(…)]</text>

    <!-- Failure path -->
    <text x="20" y="278" class="label-title">FAILURE PATHS</text>
    <rect x="20" y="290" width="680" height="56" rx="4" class="stage-fill"/>
    <rect x="20" y="290" width="680" height="56" rx="4" class="stage-stroke"/>
    <text x="32" y="312" class="label-sub">Unclosed `**`, unclosed `` ` ``, `***` (no nesting), `[label](https://…)` (non-#ref:), empty inline-code, malformed link</text>
    <text x="32" y="332" class="label-sub">→ throws ParseException(line, column, message). Eager validation in `TextSegment` constructor — bad bodies never load.</text>
</svg>
