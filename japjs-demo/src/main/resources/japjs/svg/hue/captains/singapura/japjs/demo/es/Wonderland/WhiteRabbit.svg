<svg width="200" height="295" viewBox="0 0 200 295" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .role { font-family: sans-serif; font-size: 11px; fill: #888780; }
  </style>
  <!-- pocket watch -->
  <circle cx="58" cy="195" r="12" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <circle cx="58" cy="195" r="9" fill="#C0DD97"/>
  <line x1="58" y1="191" x2="58" y2="186" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="191" x2="61" y2="194" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round"/>
  <!-- watch chain -->
  <path d="M64 190 Q76 185 86 190" stroke="#639922" stroke-width="1.5" fill="none"/>
  <!-- waistcoat body -->
  <ellipse cx="100" cy="205" rx="40" ry="38" fill="#ffffff" stroke="#D3D1C7" stroke-width="1"/>
  <!-- lapels -->
  <path d="M88 175 Q100 183 112 175 L100 170Z" fill="#B4B2A9"/>
  <!-- buttons -->
  <circle cx="100" cy="188" r="2.5" fill="#888780"/>
  <circle cx="100" cy="200" r="2.5" fill="#888780"/>
  <circle cx="100" cy="212" r="2.5" fill="#888780"/>
  <!-- jacket arms -->
  <line x1="83" y1="182" x2="60" y2="212" stroke="#B4B2A9" stroke-width="12" stroke-linecap="round"/>
  <line x1="117" y1="182" x2="140" y2="207" stroke="#B4B2A9" stroke-width="12" stroke-linecap="round"/>
  <circle cx="60" cy="215" r="9" fill="#ffffff"/>
  <circle cx="140" cy="210" r="9" fill="#ffffff"/>
  <!-- legs -->
  <rect x="84" y="235" width="11" height="22" rx="4" fill="#B4B2A9"/>
  <rect x="104" y="235" width="11" height="22" rx="4" fill="#B4B2A9"/>
  <ellipse cx="89" cy="258" rx="10" ry="6" fill="#888780"/>
  <ellipse cx="109" cy="258" rx="10" ry="6" fill="#888780"/>
  <!-- body/torso -->
  <rect x="84" y="173" width="32" height="46" rx="8" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <!-- neck -->
  <rect x="91" y="161" width="16" height="16" rx="6" fill="#ffffff"/>
  <!-- bow tie -->
  <path d="M86 165 Q100 173 114 165 Q100 159 86 165Z" fill="#E24B4A"/>
  <!-- HEAD -->
  <ellipse cx="100" cy="136" rx="30" ry="32" fill="#ffffff"/>
  <ellipse cx="100" cy="136" rx="30" ry="32" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
  <!-- EARS -->
  <ellipse cx="82" cy="82" rx="10" ry="40" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <ellipse cx="118" cy="82" rx="10" ry="40" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <ellipse cx="82" cy="83" rx="5" ry="32" fill="#F4C0D1"/>
  <ellipse cx="118" cy="83" rx="5" ry="32" fill="#F4C0D1"/>
  <!-- eyes -->
  <ellipse cx="89" cy="132" rx="6" ry="6.5" fill="#E24B4A"/>
  <ellipse cx="111" cy="132" rx="6" ry="6.5" fill="#E24B4A"/>
  <circle cx="90" cy="130" r="2" fill="white"/>
  <circle cx="112" cy="130" r="2" fill="white"/>
  <!-- nose -->
  <path d="M96 145 Q100 149 104 145 Q100 152 96 145Z" fill="#F4C0D1"/>
  <!-- mouth -->
  <path d="M93 158 Q100 164 107 158" stroke="#D3D1C7" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="70" y1="141" x2="46" y2="135" stroke="#B4B2A9" stroke-width="0.8" opacity="0.7"/>
  <line x1="70" y1="145" x2="46" y2="145" stroke="#B4B2A9" stroke-width="0.8" opacity="0.7"/>
  <line x1="130" y1="141" x2="154" y2="135" stroke="#B4B2A9" stroke-width="0.8" opacity="0.7"/>
  <line x1="130" y1="145" x2="154" y2="145" stroke="#B4B2A9" stroke-width="0.8" opacity="0.7"/>
  <text class="name" x="100" y="274" text-anchor="middle">White Rabbit</text>
  <text class="role" x="100" y="288" text-anchor="middle">The hurried herald</text>
</svg>
