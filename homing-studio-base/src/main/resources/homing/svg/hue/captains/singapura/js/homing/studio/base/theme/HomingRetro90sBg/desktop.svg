<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 800"
     preserveAspectRatio="xMinYMid slice"
     role="img" aria-hidden="true">
    <title>Windows-95 Desktop</title>

    <style>
        /* Win95 16-colour palette as it appeared on the period chassis.
           Both light and dark modes share the icon palette — only the
           background tint shifts, because real CRTs didn't have a dark mode
           but our studio does. */
        svg {
            --w95-chassis:     #C0C0C0;  /* light grey case plastic        */
            --w95-shadow:      #808080;  /* dark grey 3D bevel             */
            --w95-edge:        #FFFFFF;  /* white 3D bevel highlight       */
            --w95-screen:      #000080;  /* monitor screen navy            */
            --w95-screen-text: #FFFFFF;  /* screen caption                 */
            --w95-folder:      #FFC54B;  /* manila folder amber            */
            --w95-folder-tab:  #E0A028;  /* folder tab darker amber        */
            --w95-trash:       #C0C0C0;  /* recycle bin chassis            */
            --w95-trash-lid:   #B0B0B0;  /* lid slightly darker            */
            --w95-trash-band:  #008080;  /* recycle teal band              */
            --w95-globe:       #5588DD;  /* network globe blue             */
            --w95-globe-grid:  #FFFFFF;  /* globe latitude lines           */
            --w95-cable:       #404040;  /* network cable                  */
            --w95-label-bg:    rgba(0, 0, 128, 0.0);  /* selection band — off by default */
            --w95-label-text:  #FFFFFF;  /* label caption — white          */
        }
        @media (prefers-color-scheme: dark) {
            svg {
                /* Night-shift workstation: same chassis colours, slightly
                   muted. The studio's --color-surface flips independently
                   to deep teal, so the icons need a faint outer glow to stay
                   visible against it. */
                --w95-label-text: #C0C0C0;
            }
        }
        /* All icons share a transform-origin at their visual centre and a
           cubic-bezier ease so the hover-grow feels mechanical rather than
           bouncy — appropriate to a workstation, not a phone. */
        .w95-icon {
            transform-origin: center;
            transition: transform 200ms cubic-bezier(0.2, 0.0, 0.2, 1.0),
                        filter    200ms ease;
        }
        .w95-icon-label {
            font-family: "Courier New", "Consolas", monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            fill: var(--w95-label-text);
            text-anchor: middle;
            paint-order: stroke fill;
            stroke: rgba(0, 0, 0, 0.5);
            stroke-width: 2;
        }
    </style>

    <defs>
        <!-- Reusable Fixed3D bevel filter: 1px light edge top-left, 1px dark
             edge bottom-right. Applied to icon body rectangles for the
             characteristic Win95 raised-window look. -->
        <filter id="w95-bevel" x="-10%" y="-10%" width="120%" height="120%">
            <feFlood flood-color="white" flood-opacity="0.7" result="hi"/>
            <feComposite in="hi" in2="SourceAlpha" operator="in" result="hi-clipped"/>
            <feOffset in="hi-clipped" dx="-1" dy="-1" result="hi-offset"/>
            <feFlood flood-color="black" flood-opacity="0.5" result="lo"/>
            <feComposite in="lo" in2="SourceAlpha" operator="in" result="lo-clipped"/>
            <feOffset in="lo-clipped" dx="1" dy="1" result="lo-offset"/>
            <feMerge>
                <feMergeNode in="hi-offset"/>
                <feMergeNode in="SourceGraphic"/>
                <feMergeNode in="lo-offset"/>
            </feMerge>
        </filter>
    </defs>

    <!-- ============================================================
         ICON 1 — MY COMPUTER (CRT monitor + base + tower glimpse)
         Positioned at top-left of viewport.
         ============================================================ -->
    <g class="w95-icon w95-icon-mycomputer" transform="translate(32, 140)">
        <!-- Invisible hit-rect — extends the hover target to the full icon
             bbox including the gap above the label. pointer-events="all"
             makes it hit-testable despite transparent fill. -->
        <rect class="w95-hit" x="-6" y="-6" width="60" height="74" fill="transparent" pointer-events="all"/>
        <!-- Monitor bezel — light grey chassis with bevel. -->
        <rect x="2" y="0" width="44" height="34" fill="var(--w95-chassis)" filter="url(#w95-bevel)"/>
        <!-- Screen — navy with a single-line caption echoing the boot banner. -->
        <rect x="6" y="4" width="36" height="26" fill="var(--w95-screen)"/>
        <text x="24" y="20" font-family="Courier New, monospace" font-size="9"
              font-weight="700" fill="var(--w95-screen-text)" text-anchor="middle">C:\</text>
        <!-- Monitor stand. -->
        <rect x="18" y="34" width="12" height="4" fill="var(--w95-chassis)"/>
        <rect x="10" y="38" width="28" height="4" fill="var(--w95-chassis)" filter="url(#w95-bevel)"/>
        <!-- Tower peeking out behind. -->
        <rect x="38" y="20" width="10" height="22" fill="var(--w95-chassis)" filter="url(#w95-bevel)"/>
        <rect x="40" y="24" width="6" height="2" fill="var(--w95-shadow)"/>
        <rect x="40" y="28" width="6" height="1" fill="var(--w95-shadow)"/>
        <!-- Label. -->
        <text class="w95-icon-label" x="24" y="58">MY COMPUTER</text>
    </g>

    <!-- ============================================================
         ICON 2 — MY DOCUMENTS (manila folder)
         ============================================================ -->
    <g class="w95-icon w95-icon-documents" transform="translate(32, 232)">
        <rect class="w95-hit" x="-6" y="-6" width="60" height="74" fill="transparent" pointer-events="all"/>
        <!-- Folder tab at top-left. -->
        <path d="M 4,6 L 18,6 L 22,10 L 42,10 L 42,14 L 4,14 Z"
              fill="var(--w95-folder-tab)" filter="url(#w95-bevel)"/>
        <!-- Folder body. -->
        <rect x="4" y="12" width="40" height="26" fill="var(--w95-folder)" filter="url(#w95-bevel)"/>
        <!-- Two thin "page edge" lines suggesting documents inside. -->
        <line x1="6" y1="16" x2="42" y2="16" stroke="var(--w95-folder-tab)" stroke-width="0.5"/>
        <text class="w95-icon-label" x="24" y="58">MY DOCUMENTS</text>
    </g>

    <!-- ============================================================
         ICON 3 — NETWORK NEIGHBORHOOD (two PCs + cable + globe)
         ============================================================ -->
    <g class="w95-icon w95-icon-network" transform="translate(32, 324)">
        <rect class="w95-hit" x="-6" y="-6" width="60" height="74" fill="transparent" pointer-events="all"/>
        <!-- Globe behind. -->
        <circle cx="24" cy="20" r="14" fill="var(--w95-globe)"/>
        <!-- Latitude lines on the globe. -->
        <ellipse cx="24" cy="20" rx="14" ry="5"  fill="none" stroke="var(--w95-globe-grid)" stroke-width="0.6"/>
        <ellipse cx="24" cy="20" rx="14" ry="10" fill="none" stroke="var(--w95-globe-grid)" stroke-width="0.6"/>
        <line x1="10" y1="20" x2="38" y2="20" stroke="var(--w95-globe-grid)" stroke-width="0.6"/>
        <line x1="24" y1="6"  x2="24" y2="34" stroke="var(--w95-globe-grid)" stroke-width="0.6"/>
        <!-- Cable between the two PCs. -->
        <path d="M 12,38 Q 24,30 36,38" fill="none" stroke="var(--w95-cable)" stroke-width="1.2"/>
        <!-- Left PC. -->
        <rect x="4"  y="32" width="14" height="10" fill="var(--w95-chassis)" filter="url(#w95-bevel)"/>
        <rect x="6"  y="34" width="10" height="6"  fill="var(--w95-screen)"/>
        <!-- Right PC. -->
        <rect x="30" y="32" width="14" height="10" fill="var(--w95-chassis)" filter="url(#w95-bevel)"/>
        <rect x="32" y="34" width="10" height="6"  fill="var(--w95-screen)"/>
        <text class="w95-icon-label" x="24" y="58">NETWORK</text>
    </g>

    <!-- ============================================================
         ICON 4 — RECYCLE BIN (trash can with teal recycle band)
         ============================================================ -->
    <g class="w95-icon w95-icon-recycle" transform="translate(32, 416)">
        <rect class="w95-hit" x="-6" y="-6" width="60" height="74" fill="transparent" pointer-events="all"/>
        <!-- Lid. -->
        <rect x="6" y="6" width="36" height="4" fill="var(--w95-trash-lid)" filter="url(#w95-bevel)"/>
        <rect x="20" y="3" width="8" height="4" fill="var(--w95-trash-lid)"/>
        <!-- Bin body — slight trapezoid. -->
        <path d="M 8,10 L 40,10 L 38,40 L 10,40 Z"
              fill="var(--w95-trash)" filter="url(#w95-bevel)"/>
        <!-- Vertical ribs on the bin. -->
        <line x1="16" y1="12" x2="15" y2="38" stroke="var(--w95-shadow)" stroke-width="0.6"/>
        <line x1="24" y1="12" x2="24" y2="38" stroke="var(--w95-shadow)" stroke-width="0.6"/>
        <line x1="32" y1="12" x2="33" y2="38" stroke="var(--w95-shadow)" stroke-width="0.6"/>
        <!-- Teal recycle band with the universal recycling arrows simplified
             to three triangular wedges around the centre. -->
        <circle cx="24" cy="24" r="7" fill="var(--w95-trash-band)"/>
        <path d="M 24,18 L 28,24 L 20,24 Z" fill="var(--w95-edge)"/>
        <text class="w95-icon-label" x="24" y="58">RECYCLE BIN</text>
    </g>

</svg>
