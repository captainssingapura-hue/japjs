<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 800"
     preserveAspectRatio="xMidYMax slice"
     role="img" aria-hidden="true">
    <title>Jazz Drum Kit</title>

    <style>
        /* Palette tuned for warm-stage feel. Drums share a chamber-red shell
           with cream skins; cymbals are aged brass. Variables let the theme
           CSS retint if needed but inline fallbacks ensure standalone use. */
        svg {
            --jd-shell:        #4A1F1F;   /* drum shell (dark red) */
            --jd-shell-hi:     #6B2F2F;   /* shell highlight */
            --jd-shell-lo:     #2A0F0F;   /* shell shadow */
            --jd-skin:         #EFE4C8;   /* drum skin (cream) */
            --jd-skin-hi:      #F8F0DA;   /* skin highlight */
            --jd-rim:          #8A8A8A;   /* chrome rim */
            --jd-hardware:     #5A5A5A;   /* stands, lugs */
            --jd-hardware-hi:  #9A9A9A;   /* hardware highlight */
            --jd-cymbal:       #C7A876;   /* brass */
            --jd-cymbal-hi:    #E8D2A0;   /* brass highlight */
            --jd-cymbal-lo:    #8E7044;   /* brass shadow */
            --jd-snare-shell:  #B0B0B0;   /* snare drum is metal, not wood */
            --jd-snare-shell-hi: #D8D8D8;
            --jd-floor:        #1A0E0E;   /* dim floor */
        }

        /* Smooth hover-grow on each drum + cymbal: the visual analogue of
           "you can play this." transform-box: fill-box anchors the scale
           to each shape's own bbox (default SVG transform-origin is the
           viewport origin, which would launch elements off-screen). */
        .drum-kick, .drum-snare, .drum-hihat,
        .drum-tom-high, .drum-tom-low, .drum-floor,
        .drum-ride, .drum-crash {
            transform-box: fill-box;
            transform-origin: center;
            transition: scale 140ms ease-out, filter 140ms ease-out;
            cursor: pointer;
        }
        .drum-kick:hover, .drum-snare:hover, .drum-hihat:hover,
        .drum-tom-high:hover, .drum-tom-low:hover, .drum-floor:hover,
        .drum-ride:hover, .drum-crash:hover {
            scale: 1.04;
            filter: brightness(1.15);
        }

        /* Drum hit — depress the head, bounce back. The framework's
         * default animation works fine but a drum-specific version with
         * deeper compression + slight overshoot reads more like a real
         * struck drum head. Overrides the framework default for the 5
         * drum classes (kick, snare, 3 toms). RFC 0008 Phase 2. */
        @keyframes drum-strike {
            0%   { transform: scale(1, 1); }
            15%  { transform: scale(1.03, 0.90); }
            45%  { transform: scale(0.98, 1.04); }
            100% { transform: scale(1, 1); }
        }
        .drum-kick.played, .drum-snare.played,
        .drum-tom-high.played, .drum-tom-low.played, .drum-floor.played {
            animation: drum-strike 220ms cubic-bezier(0.25, 0.0, 0.25, 1) !important;
            transform-origin: center;
            transform-box: fill-box;
        }

        /* Cymbal strike — brief upward shimmer + brightness flash.
         * Bronze cymbals visually "ring" rather than compress; the
         * scale grows slightly and the brightness pulses. */
        @keyframes cymbal-shimmer {
            0%   { transform: scale(1); filter: brightness(1); }
            20%  { transform: scale(1.06); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .drum-hihat.played, .drum-ride.played, .drum-crash.played {
            animation: cymbal-shimmer 280ms ease-out !important;
            transform-origin: center;
            transform-box: fill-box;
        }
    </style>

    <defs>
        <radialGradient id="jd-shell-grad" cx="0.45" cy="0.45" r="0.65">
            <stop offset="0"   stop-color="var(--jd-shell-hi)"/>
            <stop offset="0.7" stop-color="var(--jd-shell)"/>
            <stop offset="1"   stop-color="var(--jd-shell-lo)"/>
        </radialGradient>
        <radialGradient id="jd-skin-grad" cx="0.4" cy="0.4" r="0.65">
            <stop offset="0"   stop-color="var(--jd-skin-hi)"/>
            <stop offset="0.8" stop-color="var(--jd-skin)"/>
            <stop offset="1"   stop-color="var(--jd-rim)"/>
        </radialGradient>
        <radialGradient id="jd-snare-grad" cx="0.4" cy="0.4" r="0.7">
            <stop offset="0"   stop-color="var(--jd-snare-shell-hi)"/>
            <stop offset="1"   stop-color="var(--jd-snare-shell)"/>
        </radialGradient>
        <radialGradient id="jd-cymbal-grad" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0"   stop-color="var(--jd-cymbal-hi)"/>
            <stop offset="0.65" stop-color="var(--jd-cymbal)"/>
            <stop offset="1"   stop-color="var(--jd-cymbal-lo)"/>
        </radialGradient>
        <linearGradient id="jd-floor-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#2A1414"/>
            <stop offset="1" stop-color="var(--jd-floor)"/>
        </linearGradient>
    </defs>

    <!-- ============================================================
         Stage floor — dim gradient. Painted first; everything else
         sits on top of it. xMidYMax preserveAspectRatio means the
         kit's bottom edge stays pinned to the bottom of the viewport.
         ============================================================ -->
    <rect x="0" y="600" width="1200" height="200" fill="url(#jd-floor-grad)"/>

    <!-- ============================================================
         RIDE CYMBAL — far right, on a tall stand. Painted before
         the drums so the drum kit visually overlaps its base.
         ============================================================ -->
    <line x1="1000" y1="780" x2="1000" y2="380" stroke="var(--jd-hardware)" stroke-width="3"/>
    <ellipse cx="1000" cy="780" rx="60" ry="6" fill="var(--jd-hardware)"/>
    <g class="drum-ride">
        <ellipse cx="1000" cy="370" rx="120" ry="22" fill="url(#jd-cymbal-grad)"/>
        <ellipse cx="1000" cy="370" rx="120" ry="22" fill="none"
                 stroke="var(--jd-cymbal-lo)" stroke-width="0.5" opacity="0.6"/>
        <!-- Concentric "lathe rings" — the visual grooves of a cymbal. -->
        <ellipse cx="1000" cy="370" rx="80"  ry="14" fill="none" stroke="var(--jd-cymbal-lo)" stroke-width="0.4" opacity="0.4"/>
        <ellipse cx="1000" cy="370" rx="50"  ry="9"  fill="none" stroke="var(--jd-cymbal-lo)" stroke-width="0.4" opacity="0.4"/>
        <ellipse cx="1000" cy="370" rx="20"  ry="3.5" fill="none" stroke="var(--jd-cymbal-lo)" stroke-width="0.4" opacity="0.4"/>
        <!-- Bell (center dome). -->
        <ellipse cx="1000" cy="368" rx="14" ry="5" fill="var(--jd-cymbal-hi)"/>
    </g>

    <!-- ============================================================
         CRASH CYMBAL — high and angled to the left, on its own stand.
         ============================================================ -->
    <line x1="240" y1="780" x2="240" y2="280" stroke="var(--jd-hardware)" stroke-width="3"/>
    <ellipse cx="240" cy="780" rx="60" ry="6" fill="var(--jd-hardware)"/>
    <g class="drum-crash" transform="rotate(-8 240 280)">
        <ellipse cx="240" cy="270" rx="95" ry="16" fill="url(#jd-cymbal-grad)"/>
        <ellipse cx="240" cy="270" rx="95" ry="16" fill="none"
                 stroke="var(--jd-cymbal-lo)" stroke-width="0.5" opacity="0.6"/>
        <ellipse cx="240" cy="270" rx="60" ry="10" fill="none" stroke="var(--jd-cymbal-lo)" stroke-width="0.4" opacity="0.4"/>
        <ellipse cx="240" cy="270" rx="30" ry="5"  fill="none" stroke="var(--jd-cymbal-lo)" stroke-width="0.4" opacity="0.4"/>
        <ellipse cx="240" cy="268" rx="12" ry="4" fill="var(--jd-cymbal-hi)"/>
    </g>

    <!-- ============================================================
         HI-HAT — two stacked cymbals on the far-left stand. The
         standard "closed" position (cymbals touching) is what we
         render; clicks fire HIHAT_CLOSED cue.
         ============================================================ -->
    <line x1="120" y1="780" x2="120" y2="500" stroke="var(--jd-hardware)" stroke-width="3"/>
    <ellipse cx="120" cy="780" rx="55" ry="6" fill="var(--jd-hardware)"/>
    <g class="drum-hihat">
        <!-- Bottom cymbal -->
        <ellipse cx="120" cy="510" rx="68" ry="9" fill="url(#jd-cymbal-grad)"/>
        <ellipse cx="120" cy="510" rx="68" ry="9" fill="none"
                 stroke="var(--jd-cymbal-lo)" stroke-width="0.5" opacity="0.6"/>
        <!-- Top cymbal (slightly offset for the "closed but not touching" look) -->
        <ellipse cx="120" cy="498" rx="68" ry="9" fill="url(#jd-cymbal-grad)"/>
        <ellipse cx="120" cy="498" rx="68" ry="9" fill="none"
                 stroke="var(--jd-cymbal-lo)" stroke-width="0.5" opacity="0.6"/>
        <ellipse cx="120" cy="496" rx="10" ry="3" fill="var(--jd-cymbal-hi)"/>
    </g>

    <!-- ============================================================
         KICK DRUM (bass drum) — the largest drum, centre-front. The
         visual anchor of the kit. Painted before the toms so they
         sit visually on top.
         ============================================================ -->
    <g class="drum-kick">
        <!-- Outer shell ring -->
        <circle cx="600" cy="650" r="160" fill="url(#jd-shell-grad)"/>
        <!-- Skin (front face) -->
        <circle cx="600" cy="650" r="140" fill="url(#jd-skin-grad)"/>
        <!-- Rim -->
        <circle cx="600" cy="650" r="140" fill="none" stroke="var(--jd-rim)" stroke-width="3"/>
        <!-- Tension lugs — 8 around the rim -->
        <circle cx="600" cy="500" r="5" fill="var(--jd-hardware-hi)"/>
        <circle cx="706" cy="544" r="5" fill="var(--jd-hardware-hi)"/>
        <circle cx="750" cy="650" r="5" fill="var(--jd-hardware-hi)"/>
        <circle cx="706" cy="756" r="5" fill="var(--jd-hardware-hi)"/>
        <circle cx="600" cy="800" r="5" fill="var(--jd-hardware-hi)"/>
        <circle cx="494" cy="756" r="5" fill="var(--jd-hardware-hi)"/>
        <circle cx="450" cy="650" r="5" fill="var(--jd-hardware-hi)"/>
        <circle cx="494" cy="544" r="5" fill="var(--jd-hardware-hi)"/>
        <!-- Decorative band logo (just a small circle for now) -->
        <circle cx="600" cy="650" r="22" fill="none" stroke="var(--jd-shell-lo)" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- ============================================================
         SNARE DRUM — small chrome-shell drum on a stand, left of kick.
         Snare wires (visible underneath in real life) aren't drawn —
         the front view shows just the top skin + shell.
         ============================================================ -->
    <line x1="380" y1="780" x2="380" y2="650" stroke="var(--jd-hardware)" stroke-width="2.5"/>
    <line x1="350" y1="780" x2="380" y2="660" stroke="var(--jd-hardware)" stroke-width="2"/>
    <line x1="410" y1="780" x2="380" y2="660" stroke="var(--jd-hardware)" stroke-width="2"/>
    <g class="drum-snare">
        <!-- Shell ring (chrome metal — lighter than the wooden toms/kick) -->
        <ellipse cx="380" cy="640" rx="75" ry="20" fill="url(#jd-snare-grad)"/>
        <ellipse cx="380" cy="640" rx="75" ry="20" fill="none"
                 stroke="var(--jd-rim)" stroke-width="1.5"/>
        <!-- Top skin -->
        <ellipse cx="380" cy="625" rx="75" ry="20" fill="url(#jd-skin-grad)"/>
        <ellipse cx="380" cy="625" rx="75" ry="20" fill="none"
                 stroke="var(--jd-rim)" stroke-width="2"/>
        <!-- Lugs -->
        <circle cx="320" cy="630" r="3.5" fill="var(--jd-hardware-hi)"/>
        <circle cx="380" cy="612" r="3.5" fill="var(--jd-hardware-hi)"/>
        <circle cx="440" cy="630" r="3.5" fill="var(--jd-hardware-hi)"/>
    </g>

    <!-- ============================================================
         HIGH TOM — mounted on top of the kick drum, left of centre.
         ============================================================ -->
    <g class="drum-tom-high">
        <!-- Shell -->
        <ellipse cx="540" cy="445" rx="55" ry="15" fill="url(#jd-shell-grad)"/>
        <rect x="485" y="445" width="110" height="42" fill="url(#jd-shell-grad)"/>
        <ellipse cx="540" cy="487" rx="55" ry="14" fill="var(--jd-shell-lo)"/>
        <!-- Skin -->
        <ellipse cx="540" cy="440" rx="55" ry="15" fill="url(#jd-skin-grad)"/>
        <ellipse cx="540" cy="440" rx="55" ry="15" fill="none"
                 stroke="var(--jd-rim)" stroke-width="2"/>
        <circle cx="495" cy="442" r="3" fill="var(--jd-hardware-hi)"/>
        <circle cx="540" cy="428" r="3" fill="var(--jd-hardware-hi)"/>
        <circle cx="585" cy="442" r="3" fill="var(--jd-hardware-hi)"/>
    </g>

    <!-- ============================================================
         LOW TOM — mounted on top of the kick drum, right of high tom.
         ============================================================ -->
    <g class="drum-tom-low">
        <ellipse cx="660" cy="445" rx="55" ry="15" fill="url(#jd-shell-grad)"/>
        <rect x="605" y="445" width="110" height="42" fill="url(#jd-shell-grad)"/>
        <ellipse cx="660" cy="487" rx="55" ry="14" fill="var(--jd-shell-lo)"/>
        <ellipse cx="660" cy="440" rx="55" ry="15" fill="url(#jd-skin-grad)"/>
        <ellipse cx="660" cy="440" rx="55" ry="15" fill="none"
                 stroke="var(--jd-rim)" stroke-width="2"/>
        <circle cx="615" cy="442" r="3" fill="var(--jd-hardware-hi)"/>
        <circle cx="660" cy="428" r="3" fill="var(--jd-hardware-hi)"/>
        <circle cx="705" cy="442" r="3" fill="var(--jd-hardware-hi)"/>
    </g>

    <!-- ============================================================
         FLOOR TOM — the big standing tom to the right of the kick,
         with three legs.
         ============================================================ -->
    <line x1="850" y1="600" x2="830" y2="780" stroke="var(--jd-hardware)" stroke-width="2.5"/>
    <line x1="900" y1="600" x2="900" y2="780" stroke="var(--jd-hardware)" stroke-width="2.5"/>
    <line x1="950" y1="600" x2="970" y2="780" stroke="var(--jd-hardware)" stroke-width="2.5"/>
    <g class="drum-floor">
        <!-- Shell -->
        <ellipse cx="900" cy="600" rx="80" ry="22" fill="url(#jd-shell-grad)"/>
        <rect x="820" y="600" width="160" height="70" fill="url(#jd-shell-grad)"/>
        <ellipse cx="900" cy="670" rx="80" ry="22" fill="var(--jd-shell-lo)"/>
        <!-- Skin -->
        <ellipse cx="900" cy="595" rx="80" ry="22" fill="url(#jd-skin-grad)"/>
        <ellipse cx="900" cy="595" rx="80" ry="22" fill="none"
                 stroke="var(--jd-rim)" stroke-width="2.5"/>
        <circle cx="830" cy="600" r="4" fill="var(--jd-hardware-hi)"/>
        <circle cx="900" cy="578" r="4" fill="var(--jd-hardware-hi)"/>
        <circle cx="970" cy="600" r="4" fill="var(--jd-hardware-hi)"/>
    </g>

</svg>
