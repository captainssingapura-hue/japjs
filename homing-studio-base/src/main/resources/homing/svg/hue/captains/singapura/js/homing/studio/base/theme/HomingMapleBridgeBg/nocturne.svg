<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 680 380"
     preserveAspectRatio="xMidYMid slice"
     role="img" aria-hidden="true">
    <title>Night Mooring at Maple Bridge</title>

    <style>
        /* Default — night. Class-based light-mode targeting won't fire when
           used as a background-image sandbox; we keep only the OS-preference
           media query, which works whether the SVG is inline DOM or loaded
           as a background image. */
        svg {
            --mb-sky-top: #0d1b2a; --mb-sky-mid: #1b2d44; --mb-sky-bot: #2a3f5a;
            --mb-water-top: #1a2a3e; --mb-water-bot: #0a131e;
            --mb-star: #cbd9e8; --mb-star-opacity: 1;
            --mb-moon: #f5e3b0; --mb-moon-opacity: 0.92;
            --mb-mist: #bcc7d6;
            --mb-mountain-far: #1f2c3f; --mb-mountain-mid: #16212f; --mb-mountain-near: #0d1620;
            --mb-temple: #0e1620; --mb-temple-window: #d9a35a; --mb-temple-window-opacity: 0.45;
            --mb-reflection-1: #f0dca8; --mb-reflection-2: #e8d2a0; --mb-reflection-3: #d8c08a;
            --mb-reflection-4: #c9b07a; --mb-reflection-5: #b89c66; --mb-reflection-6: #a88c56;
            --mb-reflection-opacity: 0.4;
            --mb-ripple: #3a5070; --mb-ripple-opacity: 0.35;
        }
        @media (prefers-color-scheme: light) {
            svg {
                --mb-sky-top: #b8c5d6; --mb-sky-mid: #d4b896; --mb-sky-bot: #e8c9a0;
                --mb-water-top: #c4b89a; --mb-water-bot: #9aa8b8;
                --mb-star-opacity: 0;
                --mb-moon: #fff5dc; --mb-moon-opacity: 0.85;
                --mb-mist: #ffffff;
                --mb-mountain-far: #a8b0c0; --mb-mountain-mid: #7a8294; --mb-mountain-near: #4a5466;
                --mb-temple: #3a4250; --mb-temple-window: #8a6a3a; --mb-temple-window-opacity: 0.3;
                --mb-reflection-1: #fff5dc; --mb-reflection-2: #f0e0b8; --mb-reflection-3: #e0cca0;
                --mb-reflection-4: #d0b888; --mb-reflection-5: #c0a878; --mb-reflection-6: #a89868;
                --mb-reflection-opacity: 0.35;
                --mb-ripple: #6a7888; --mb-ripple-opacity: 0.3;
            }
        }
    </style>

    <defs>
        <linearGradient id="mb-sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0"    stop-color="var(--mb-sky-top)"/>
            <stop offset="0.55" stop-color="var(--mb-sky-mid)"/>
            <stop offset="1"    stop-color="var(--mb-sky-bot)"/>
        </linearGradient>
        <linearGradient id="mb-water" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="var(--mb-water-top)"/>
            <stop offset="1" stop-color="var(--mb-water-bot)"/>
        </linearGradient>
        <clipPath id="mb-frame"><rect x="0" y="0" width="680" height="380"/></clipPath>
        <mask id="mb-crescent">
            <rect x="0" y="0" width="680" height="380" fill="white"/>
            <!-- Classed so theme CSS can scale it in lockstep with .mb-moon
                 on hover — keeps the crescent's shape consistent as the moon
                 grows. Original: cx=155, cy=170 (offset +15,-5 from the moon
                 centre at 140,175), r=26 (matched to moon r=28). -->
            <circle class="mb-moon-shadow" cx="155" cy="170" r="26" fill="black"/>
        </mask>
    </defs>

    <g clip-path="url(#mb-frame)">

        <rect x="0" y="0" width="680" height="260" fill="url(#mb-sky)"/>

        <g style="opacity: var(--mb-star-opacity)">
            <circle cx="120" cy="55"  r="0.8" fill="var(--mb-star)" opacity="0.7"/>
            <circle cx="205" cy="38"  r="0.6" fill="var(--mb-star)" opacity="0.5"/>
            <circle cx="310" cy="70"  r="0.7" fill="var(--mb-star)" opacity="0.45"/>
            <circle cx="455" cy="48"  r="0.5" fill="var(--mb-star)" opacity="0.5"/>
            <circle cx="540" cy="85"  r="0.8" fill="var(--mb-star)" opacity="0.6"/>
            <circle cx="610" cy="42"  r="0.6" fill="var(--mb-star)" opacity="0.45"/>
            <circle cx="60"  cy="95"  r="0.5" fill="var(--mb-star)" opacity="0.4"/>
            <circle cx="380" cy="32"  r="0.6" fill="var(--mb-star)" opacity="0.5"/>
            <circle cx="250" cy="115" r="0.5" fill="var(--mb-star)" opacity="0.4"/>
            <circle cx="490" cy="120" r="0.6" fill="var(--mb-star)" opacity="0.45"/>
        </g>

        <!-- Moon: classed so theme CSS can target it for the hover-grow effect.
             The crescent mask carves the shadow side; on hover the moon's
             radius transitions to a larger value while the mask stays put. -->
        <g mask="url(#mb-crescent)">
            <circle class="mb-moon"
                    cx="140" cy="175" r="28"
                    fill="var(--mb-moon)"
                    style="opacity: var(--mb-moon-opacity)"/>
        </g>

        <rect x="0" y="165" width="680" height="50" fill="var(--mb-mist)" opacity="0.05"/>
        <rect x="0" y="195" width="680" height="30" fill="var(--mb-mist)" opacity="0.07"/>
        <rect x="0" y="215" width="680" height="20" fill="var(--mb-mist)" opacity="0.05"/>

        <path d="M0 210 L80 195 L160 205 L240 192 L320 200 L400 188 L480 198 L560 190 L640 196 L680 192 L680 225 L0 225 Z"
              fill="var(--mb-mountain-far)" opacity="0.6"/>

        <g class="mb-temple" opacity="0.75" fill="var(--mb-temple)">
            <rect x="556" y="210" width="64" height="22"/>
            <path d="M548 210 Q588 192 628 210 L620 210 Q588 199 556 210 Z"/>
            <path d="M548 210 L552 206 L556 210 Z"/>
            <path d="M624 210 L620 206 L616 210 Z"/>
            <rect x="572" y="196" width="32" height="14"/>
            <path d="M566 196 Q588 184 610 196 L604 196 Q588 189 572 196 Z"/>
            <rect x="586" y="187" width="4" height="9"/>
            <circle cx="588" cy="185" r="2"/>
        </g>
        <rect class="mb-temple-window"
              x="582" y="200" width="6" height="6"
              fill="var(--mb-temple-window)"
              style="opacity: var(--mb-temple-window-opacity)"/>

        <path d="M0 222 L60 210 L140 218 L220 205 L290 215 L360 208 L430 218 L510 206 L590 215 L680 208 L680 235 L0 235 Z"
              fill="var(--mb-mountain-mid)" opacity="0.92"/>
        <path d="M0 232 L100 222 L200 230 L300 220 L400 228 L500 220 L600 228 L680 222 L680 245 L0 245 Z"
              fill="var(--mb-mountain-near)" opacity="0.95"/>

        <rect x="0" y="240" width="680" height="140" fill="url(#mb-water)"/>

        <g style="opacity: var(--mb-reflection-opacity)">
            <ellipse cx="140" cy="252" rx="16" ry="1.6" fill="var(--mb-reflection-1)"/>
            <ellipse cx="140" cy="262" rx="22" ry="1.2" fill="var(--mb-reflection-2)"/>
            <ellipse cx="140" cy="272" rx="14" ry="1"   fill="var(--mb-reflection-3)"/>
            <ellipse cx="140" cy="282" rx="20" ry="0.8" fill="var(--mb-reflection-4)"/>
            <ellipse cx="140" cy="294" rx="12" ry="0.6" fill="var(--mb-reflection-5)"/>
            <ellipse cx="140" cy="306" rx="16" ry="0.5" fill="var(--mb-reflection-6)"/>
        </g>

        <g fill="none" stroke="var(--mb-ripple)" stroke-width="0.4" style="opacity: var(--mb-ripple-opacity)">
            <path d="M260 270 Q310 268 360 270"/>
            <path d="M420 280 Q470 278 520 280"/>
            <path d="M540 300 Q600 298 660 300"/>
            <path d="M40 310 Q100 308 160 310"/>
            <path d="M280 325 Q350 323 420 325"/>
            <path d="M440 345 Q510 343 580 345"/>
            <path d="M60 355 Q140 353 220 355"/>
            <path d="M340 365 Q420 363 500 365"/>
        </g>

    </g>
</svg>
